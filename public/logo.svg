<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: dark rounded square background -->
  <rect width="32" height="32" rx="8" fill="#1e293b"/>

  <!-- 5 bars (Mon–Fri) forming a W, anchored at y=27 -->
  <rect x="2"  y="4"  width="4" height="22" rx="2" fill="url(#bar)"/>
  <rect x="8"  y="12" width="4" height="14" rx="2" fill="url(#bar)" opacity="0.78"/>
  <rect x="14" y="18" width="4" height="8"  rx="2" fill="url(#bar)" opacity="0.55"/>
  <rect x="20" y="12" width="4" height="14" rx="2" fill="url(#bar)" opacity="0.78"/>
  <rect x="26" y="4"  width="4" height="22" rx="2" fill="url(#bar)"/>
  <!-- baseline -->
  <rect x="2" y="27" width="28" height="2" rx="1" fill="#334155"/>

  <!-- Wordmark: "Weeklie" -->
  <text
    x="40"
    y="22"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="18"
    font-weight="800"
    letter-spacing="-0.04em"
    fill="#f8fafc"
  >Weeklie</text>
</svg>
